<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>Code Arena | Login</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body {
            justify-content: center;
            align-items: center;
        }

        .auth-container {
            max-width: 400px;
            width: 100%;
            padding: 32px;
            text-align: center;
        }

        .form-group {
            margin-bottom: 20px;
            text-align: left;
        }

        .form-group label {
            display: block;
            margin-bottom: 8px;
            color: var(--text-secondary);
            font-size: 0.9rem;
        }

        .form-control {
            width: 100%;
            background: rgba(0, 0, 0, 0.3);
            border: 1px solid var(--border-color);
            border-radius: 6px;
            padding: 12px;
            color: var(--text-primary);
            font-family: var(--font-main);
        }

        .form-control:focus {
            outline: none;
            border-color: var(--accent-color);
        }

        .submit-btn {
            width: 100%;
            padding: 12px;
            font-size: 1rem;
            margin-top: 10px;
            justify-content: center;
        }

        .auth-links {
            margin-top: 24px;
            font-size: 0.9rem;
            color: var(--text-secondary);
        }

        .auth-links a {
            color: var(--accent-color);
            text-decoration: none;
            font-weight: 500;
        }

        .auth-links a:hover {
            text-decoration: underline;
        }
    </style>
</head>

<body class="dark-theme">
    <div class="auth-container glass-card">
        <div class="logo" style="justify-content: center; margin-bottom: 24px; font-size: 1.5rem;">
            <i class="fa-solid fa-code"></i> Code Arena
        </div>
        <h2 style="margin-bottom: 24px;">Welcome Back</h2>

        {% if error %}
        <div class="error-banner"
            style="background: rgba(239, 68, 68, 0.15); border: 1px solid var(--danger-color, #ef4444); color: var(--danger-color, #ef4444); padding: 12px; border-radius: 6px; margin-bottom: 20px; font-size: 0.9rem;">
            {{ error }}
        </div>
        {% endif %}

        <form action="/login" method="POST">
            <div class="form-group">
                <label>Username</label>
                <input type="text" name="username" class="form-control" required placeholder="Enter username">
            </div>
            <div class="form-group">
                <label>Password</label>
                <input type="password" name="password" class="form-control" required placeholder="Enter password">
            </div>
            <button type="submit" class="btn btn-primary submit-btn"><i class="fa-solid fa-right-to-bracket"></i>
                Login</button>
        </form>

        <div class="auth-links">
            Don't have an account? <a href="/register">Register here</a>
        </div>
    </div>
</body>

</html>
