<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>Code Arena | Register</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body {
            justify-content: center;
            align-items: center;
        }

        .auth-container {
            max-width: 400px;
            width: 100%;
            padding: 32px;
            text-align: center;
        }

        .form-group {
            margin-bottom: 20px;
            text-align: left;
        }

        .form-group label {
            display: block;
            margin-bottom: 8px;
            color: var(--text-secondary);
            font-size: 0.9rem;
        }

        .form-control {
            width: 100%;
            background: rgba(0, 0, 0, 0.3);
            border: 1px solid var(--border-color);
            border-radius: 6px;
            padding: 12px;
            color: var(--text-primary);
            font-family: var(--font-main);
        }

        .form-control:focus {
            outline: none;
            border-color: var(--accent-color);
        }

        .submit-btn {
            width: 100%;
            padding: 12px;
            font-size: 1rem;
            margin-top: 10px;
            justify-content: center;
            background: var(--accent-color);
            box-shadow: 0 4px 12px rgba(99, 102, 241, 0.3);
            border: none;
        }

        .submit-btn:hover {
            background: var(--accent-hover);
            transform: translateY(-1px);
            box-shadow: 0 6px 16px rgba(99, 102, 241, 0.4);
        }

        .auth-links {
            margin-top: 24px;
            font-size: 0.9rem;
            color: var(--text-secondary);
        }

        .auth-links a {
            color: var(--accent-color);
            text-decoration: none;
            font-weight: 500;
        }

        .auth-links a:hover {
            text-decoration: underline;
        }
    </style>
</head>

<body class="dark-theme">
    <div class="auth-container glass-card">
        <div class="logo" style="justify-content: center; margin-bottom: 24px; font-size: 1.5rem;">
            <i class="fa-solid fa-code"></i> Code Arena
        </div>
        <h2 style="margin-bottom: 24px;">Create Account</h2>

        <form action="/register" method="POST">
            <div class="form-group">
                <label>Username</label>
                <input type="text" name="username" class="form-control" required placeholder="Choose a username">
            </div>
            <div class="form-group">
                <label>Password</label>
                <input type="password" name="password" class="form-control" required placeholder="Create a password">
            </div>
            <div class="form-group">
                <label>Role</label>
                <select name="role" class="form-control" required>
                    <option value="user">User</option>
                    <option value="admin">Admin</option>
                </select>
            </div>
            <button type="submit" class="btn btn-primary submit-btn"><i class="fa-solid fa-user-plus"></i>
                Register</button>
        </form>

        <div class="auth-links">
            Already have an account? <a href="/login">Login here</a>
        </div>
    </div>
</body>

</html>
